services:
  ons-backend:
    environment:
      # The backend can derive the Firebase project id from the mounted service account if needed.
      FCM_SERVICE_ACCOUNT_FILE: /run/secrets/firebase-adminsdk.json
    volumes:
      # Bind the Firebase admin SDK key from the Docker host into the container as read-only.
      - type: bind
        source: ${FCM_SERVICE_ACCOUNT_HOST_PATH}
        target: /run/secrets/firebase-adminsdk.json
        read_only: true
        bind:
          create_host_path: false